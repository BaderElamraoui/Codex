  only:
    refs:
      - master-uat 


include:
  - template: Code-Quality.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

code_quality:
  stage:  test
  tags:
    - code
  rules:
    - if: $CI_COMMIT_BRANCH == "master-newUat" || $CI_COMMIT_BRANCH == "master-uat" || $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    REPORT_FORMAT: html
  artifacts:
    paths: [gl-code-quality-report.html]   

semgrep-sast:
  tags:
    - code 
  rules:
    - if: $CI_COMMIT_BRANCH == "master-newUat" || $CI_COMMIT_BRANCH == "master-uat" || $CI_PIPELINE_SOURCE == "merge_request_event"
  stage: test

